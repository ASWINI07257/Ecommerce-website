<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wishlist Page</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-image: url("wi.jpeg");
      background-size: cover;
      background-position: center;
    }

    .overlay {
      background: rgba(0,0,0,0.6);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .wishlist {
      background: red;
      padding: 10px 15px;
      border-radius: 20px;
      font-weight: bold;
    }

    .products {
      display: flex;
      gap: 20px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .product {
      background: white;
      color: black;
      width: 200px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: crimson;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    
    
    .btn:hover {
      background: darkred;
    }
  </style>
</head>

<body>

<div class="overlay">

  <!-- Header -->
  <div class="header">
    <h2>My Shop</h2>
       <br><br> <br><h2><button onclick="location.href='st.html'",class="btn btn-green"><h3>Back</h3></button>
    <div class="wishlist">Wishlist: <span id="wishCount">0</span></div>
  </div>


  <!-- Products -->
  <div class="products">

    <div class="product">
      <img src="spo.jpeg">
      <h3>Watch</h3>
      <button class="btn" onclick="addWishlist()">Add to Wishlist ❤️</button>
    </div>

    <div class="product">
      <img src="shoe.jpeg">
      <h3>Shoes</h3>
      <button class="btn" onclick="addWishlist()">Add to Wishlist ❤️</button>
    </div>

    <div class="product">
      <img src="head.jpeg">
      <h3>Headphones</h3>
      <button class="btn" onclick="addWishlist()">Add to Wishlist ❤️</button>
    </div>

    <div class="product">
      <img src="new.jpeg">
      <h3>Perfume</h3>
      <button class="btn" onclick="addWishlist()">Add to Wishlist ❤️</button>
    </div>

  </div>

</div>

<script>
  let wishCount = 0;

  function addWishlist() {
    wishCount++;
    document.getElementById("wishCount").innerText = wishCount;
  }
</script>

</body>
</html>
