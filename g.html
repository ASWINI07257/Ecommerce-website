<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Arrivals</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* SECTION BACKGROUND */
.new-arrivals {
  background: url('https://images.unsplash.com/photo-1521334884684-d80222895322') center/cover no-repeat;
  padding: 150px 20px;
  text-align: center;
  color:black;
}

/* CONTAINER */
.arrival-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* CARD */
.arrival-card {
  background: rgba(0,0,0,0.7);
  width: 200px;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.arrival-card:hover {
  transform: scale(1.05);
}

/* IMAGE */
.arrival-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

/* TEXT */
.arrival-card h4 {
  margin: 10px 0;
}

.price {
  color: #00ffcc;
  font-weight: bold;
}

/* BUTTON */
.arrival-card button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  background: orange;
  color: black;
  border-radius: 5px;
  cursor: pointer;
}
</style>

</head>
<body>
       <h2><button onclick="location.href='st.html'",class="btn btn-green"><h3>Back</h3></button>

<section class="new-arrivals">

  <h1><b><black>New Arrivals</black></b> </h1>

  <div class="arrival-container">

    <!-- 1 -->
    <div class="arrival-card">
      <img src="https://images.unsplash.com/photo-1598032895397-b9472444bf93">
      <h4>Casual T-Shirt</h4>
      <p class="price">₹299</p>
      <button>Add to Cart</button>
    </div>

    <!-- 2 -->
    <div class="arrival-card">
      <img src="https://images.unsplash.com/photo-1587829741301-dc798b83add3">
      <h4>Keyboard</h4>
      <p class="price">₹599</p>
      <button>Add to Cart</button>
    </div>

    <!-- 3 -->
    <div class="arrival-card">
      <img src="https://images.unsplash.com/photo-1600185365483-26d7a4cc7519">
      <h4>shoe</h4>
      <p class="price">₹499</p>
      <button>Add to Cart</button>
    </div>

    <!-- 4 -->
    <div class="arrival-card">
      <img src="https://images.unsplash.com/photo-1618354691792-d1d42acfd860">
      <h4>Cap</h4>
      <p class="price">₹199</p>
      <button>Add to Cart</button>
    </div>

    <!-- 5 -->
    <div class="arrival-card">
      <img src="ear.jpg">
      <h4>Earings</h4>
      <p class="price">₹399</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

</body>
</html>
