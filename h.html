<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Sellers</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* SECTION BACKGROUND */
.best-sellers {
  background: url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f') center/cover no-repeat;
  padding: 150px 20px;
  text-align: center;
  color:white;
}

/* CONTAINER */
.seller-container {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
}

/* CARD */
.seller-card {
  background: rgba(0,0,0,0.7);
  width: 200px;
  padding: 15px;
  border-radius: 10px;
  transition: 0.3s;
}

.seller-card:hover {
  transform: scale(1.05);
}

/* IMAGE */
.seller-card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 10px;
}

/* TEXT */
.seller-card h4 {
  margin: 10px 0;
}

.price {
  color: #00ffcc;
  font-weight: bold;
}

/* RATING */
.rating {
  color: gold;
}

/* BUTTON */
.seller-card button {
  margin-top: 10px;
  padding: 8px;
  border: none;
  background: red;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}

</style>

</head>
<body>
         <h2><button onclick="location.href='st.html'",class="btn btn-green"><h3>Back</h3></button>

<section class="best-sellers">
  <h1><b>Best Sellers</b></h1>


  <div class="seller-container">

    <!-- 1 -->
    <div class="seller-card">
      <img src="head.jpeg">
      <h4>Headphone</h4>
      <p class="price">₹1499</p>
      <p class="rating">★★★★★</p>
      <button>Add to Cart</button>
    </div>

    <!-- 2 -->
    <div class="seller-card">
      <img src="https://images.unsplash.com/photo-1587829741301-dc798b83add3">
      <h4>Gaming keyboard</h4>
      <p class="price">₹699</p>
      <p class="rating">★★★★☆</p>
      <button>Add to Cart</button>
    </div>

    <!-- 3 -->
    <div class="seller-card">
      <img src="https://images.unsplash.com/photo-1593642532871-8b12e02d091c">
      <h4>Note pad</h4>
      <p class="price">₹899</p>
      <p class="rating">★★★★★</p>
      <button>Add to Cart</button>
    </div>

    <!-- 4 -->
    <div class="seller-card">
      <img src="bag.jpg">
      <h4>Bag</h4>
      <p class="price">₹1299</p>
      <p class="rating">★★★★☆</p>
      <button>Add to Cart</button>
    </div>

    <!-- 5 -->
    <div class="seller-card">
      <img src="phone.jpg">
      <h4>Phone case</h4>
      <p class="price">₹499</p>
      <p class="rating">★★★★★</p>
      <button>Add to Cart</button>
    </div>

  </div>
</section>

</body>
</html>
