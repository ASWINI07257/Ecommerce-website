<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E-commerce UI</title>
      <link rel="html" href="st.html">


<style>
/* ===== Background ===== */
body {
  margin: 0;
  padding: 0;
  font-family: Arial, sans-serif;
  background-image: url("image copy 2.png");
  background-size: cover;
  background-position: center;
  height: 100vh;
}

/* Dark overlay */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* ===== Navbar ===== */
.navbar {
  display: flex;
  justify-content: center;
  align-items: center;
  flex-wrap: wrap;
  background: rgba(255,255,255,0.9);
  padding: 15px;
}

.navbar button {
  background: green;
  color: white;
  border: none;
  margin: 5px;
  padding: 8px 12px;
  cursor: pointer;
  border-radius: 5px;
}

.navbar button:hover {
  background: darkgreen;
}

.navbar input {
  padding: 7px;
  margin: 5px;
  width: 200px;
}

/* ===== Corner Letter ===== */
.corner-letter {
  position: fixed;
  top: 10px;
  right: 15px;
  background: green;
  color: white;
  width: 45px;
  height: 45px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 20px;
}

/* ===== Login Box ===== */
.login-box {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 25px;
  width: 300px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.3);
}

.login-box h2 {
  text-align: center;
  color: green;
}

.login-box input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 5px;
  border: 1px solid #ccc;
}

.login-box button {
  width: 100%;
  padding: 10px;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.login-box button:hover {
  background: darkgreen;
}
.btn-green {
      background-color: green;
      color: white;
      margin: 5px;
    }

</style>

</head>

<body>

<!-- Navbar -->
<div class="navbar">
  <h1><white>Welcome to Login page</white></h1>
</div>

<!-- Corner Letter -->
<div class="corner-letter">A</div>

<!-- Login Box -->
<div class="login-box">
  <h2>Login</h2>
  <input type="email" placeholder="Email">
  <input type="password" placeholder="Password">
  <button onclick="location.href='st.html'">Login</button>
</div>

</body>
</html>
